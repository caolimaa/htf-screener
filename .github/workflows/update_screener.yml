name: Daily HTF Screener Update

on:
  schedule:
    - cron: '0 23 * * 1-5'   # Mon–Fri at 11 PM UTC (7 AM HKT)
  workflow_dispatch:          # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screener.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screener_results.json
          git diff --staged --quiet || git commit -m "Auto-update screener results $(date -u '+%Y-%m-%d')"
          git push
